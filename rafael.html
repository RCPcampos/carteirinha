<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carteira — Rafael Campos Pacheco</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="cartao">

    <div class="painel-esq">
      <img class="logo-estrela" src="imagem/estrela.png" alt="Logo Módulo">
      <div class="instituicao">
        <span class="inst-modulo">Módulo</span>
        <span class="inst-sub">Centro Universitário</span>
      </div>
      <div class="divider"></div>
      <span class="tipo-cartao">Carteira Estudantil</span>
    </div>

    <div class="conteudo">
      <span class="label-id">Identificação Acadêmica</span>
      <h1 class="nome-aluno">Rafael Campos<br>Pacheco</h1>
      <span class="badge-curso">Tecnólogo em ADS</span>

      <div class="infos">
        <div class="info-row">
          <span class="info-label">RGM</span>
          <span class="info-valor">11352548758</span>
        </div>
        <div class="info-row">
          <span class="info-label">Curso</span>
          <span class="info-valor">Análise e Desenvolvimento de Sistemas</span>
        </div>
      </div>

      <div class="validade-chip">
        Válido até <span>12 / 2026</span>
      </div>
    </div>

    <div class="painel-foto">
      <img class="foto-perfil" src="imagem/rafael.jpg" alt="Foto de Rafael">
    </div>

  </div>
</body>
</html>
